<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 強制讓 AI Studio 模擬 GitHub 的子目錄環境
      (function() {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname.includes('googleusercontent.com');
        if (isLocal) {
          // 在 AI Studio 預覽時，手動補齊路徑偏移
          console.log("偵測到 AI Studio 環境，正在校準路徑...");
        }
        
        // 建立一個 base 標籤，讓所有相對路徑自動加上倉庫名稱
        const base = document.createElement('base');
        // 如果你在 GitHub，它會用 /Wuwa-chronicle/
        // 如果在 AI Studio，我們也強制它用一樣的結構
        base.href = window.location.hostname.includes('github.io') 
                    ? '/Wuwa-chronicle/' 
                    : './'; 
        document.head.appendChild(base);
      })();
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
