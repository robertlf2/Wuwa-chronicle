<!doctype html>
<html lang="en">
  <head>
    <base href="/Wuwa-chronicle/">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 強制讓 AI Studio 模擬 GitHub 的子目錄環境
      (function() {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname.includes('googleusercontent.com');
        if (isLocal) {
          // 在 AI Studio 預覽時，手動補齊路徑偏移
          console.log("偵測到 AI Studio 環境，正在校準路徑...");
        }
        
        // 如果你在 GitHub，它會用 /Wuwa-chronicle/
        // 如果在 AI Studio，我們也強制它用一樣的結構
        const baseTag = document.querySelector('base');
        if (window.location.hostname.includes('github.io')) {
          baseTag.href = '/Wuwa-chronicle/';
        } else {
          baseTag.href = './';
        }
      })();
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
